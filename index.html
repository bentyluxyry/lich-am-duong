<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vạn Niên Số | Lịch Âm Dương</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app-container">
        
        <!-- Header Ứng Dụng -->
        <header class="app-header">
            <div class="logo">L</div>
            <div class="app-name">Vạn Niên Số</div>
        </header>

        <!-- Khung Lịch Chính -->
        <div class="calendar-view">
            <div class="calendar-nav">
                <button class="nav-arrow" id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                <div class="current-month-year">
                    <span id="displayMonthYear">Tháng 11, 2025</span>
                    <button class="toggle-notify"><i class="fas fa-bell"></i> Bật thông báo ngày</button>
                </div>
                <button class="nav-arrow" id="nextMonth"><i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="calendar-grid">
                <!-- Header Days (Tên thứ) -->
                <div class="calendar-header-day">CN</div>
                <div class="calendar-header-day">T2</div>
                <div class="calendar-header-day">T3</div>
                <div class="calendar-header-day">T4</div>
                <div class="calendar-header-day">T5</div>
                <div class="calendar-header-day">T6</div>
                <div class="calendar-header-day">T7</div>
                <!-- Days will be generated by JavaScript -->
            </div>
        </div>

        <!-- Modal chi tiết ngày và Ghi chú/Reminder -->
        <div id="dayDetailModal" class="modal">
            <div class="modal-content">
                <span class="close-button">&times;</span>
                <h2 id="modalDateDisplay">Chi tiết ngày...</h2>
                
                <!-- Khu vực Ghi chú -->
                <h3><i class="fas fa-pencil-alt"></i> Ghi Chú:</h3>
                <textarea id="noteInput" placeholder="Thêm ghi chú cá nhân cho ngày này..."></textarea>
                <button id="saveNoteBtn" class="primary-btn"><i class="fas fa-save"></i> Lưu Ghi Chú</button>
                <hr>

                <!-- Khu vực Reminders -->
                <h3><i class="fas fa-bell"></i> Reminders/Sự kiện:</h3>
                <ul id="reminderList">
                    <!-- Items sẽ được chèn bởi JS -->
                </ul>
                <button id="addReminderBtn" class="secondary-btn"><i class="fas fa-plus"></i> Thêm Reminder</button>
            </div>
        </div>
        
        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active">
                <i class="fas fa-calendar-alt"></i>
                <span>LỊCH</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-heart"></i>
                <span>BÓI DUYÊN</span>
            </a>
            <a href="blog.html" class="nav-item">
                <i class="fas fa-comment-dots"></i>
                <span>TRỢ LÝ</span>
            </a>
        </nav>
    </div>
    <script src="js/main.js"></script>
</body>
</html>

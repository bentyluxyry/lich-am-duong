<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Vạn Niên Số</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app-container">
        
        <header class="app-header">
            <div class="app-title-group">
                <img src="img/logo.png" alt="Logo Vạn Niên Số" class="app-logo"> 
                <h1>Vạn Niên Số</h1>
            </div>
            <button class="settings-btn">
                <i class="fas fa-cog"></i>
            </button>
        </header>

        <nav class="top-nav">
            <a href="index.html" class="nav-item active">LỊCH</a>
            <a href="#" class="nav-item">BÓI DUYÊN</a>
            <a href="blog.html" class="nav-item">TRỢ LÝ</a>
        </nav>
        <div class="calendar-card">
            
            <div class="month-navigator">
                <button class="nav-arrow prev-month"><i class="fas fa-chevron-left"></i></button>
                <div class="current-month-info">
                    <span id="current-month-year">Tháng 11, 2025</span>
                    <button class="toggle-notification">
                        <i class="fas fa-bell"></i> Bật thông báo ngày
                    </button>
                </div>
                <button class="nav-arrow next-month"><i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="calendar-grid day-headers">
                <span class="header-item">CN</span>
                <span class="header-item">T2</span>
                <span class="header-item">T3</span>
                <span class="header-item">T4</span>
                <span class="header-item">T5</span>
                <span class="header-item">T6</span>
                <span class="header-item">T7</span>
            </div>

            <div class="calendar-grid day-cells" id="calendar-body">
                </div>
        </div>
        
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active">
                <i class="fas fa-calendar-alt"></i>
                <span>LỊCH</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-heart"></i>
                <span>BÓI DUYÊN</span>
            </a>
            <a href="blog.html" class="nav-item">
                <i class="fas fa-comment-dots"></i>
                <span>TRỢ LÝ</span>
            </a>
        </nav>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
